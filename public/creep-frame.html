<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>fp</title></head>
<body>
<script>
// Block ServiceWorker trong iframe
try {
 if (navigator.serviceWorker) {
  Object.defineProperty(navigator, 'serviceWorker', { get: function() { return undefined; } });
 }
} catch(e) {}

var _sent = false;
var _origError = console.error;

// Ẩn lỗi worker
console.error = function() {
 for (var i = 0; i < arguments.length; i++) {
  var msg = String(arguments[i] || '');
  if (msg.indexOf('orker') !== -1 || msg.indexOf('fetch') !== -1) return;
 }
 _origError.apply(console, arguments);
};

function sendResult(data) {
 if (_sent) return;
 // Bắt buộc phải có visitorId thật — không gửi 'unknown'
 if (!data.visitorId || data.visitorId === 'unknown') return;
 _sent = true;
 if (window.parent && window.parent !== window) {
  window.parent.postMessage({ type: 'creep-result', data: data }, '*');
 }
}

// SHA-256 hash — giống cách CreepJS tính
function sha256(text) {
 var data = new TextEncoder().encode(text);
 return crypto.subtle.digest('SHA-256', data).then(function(buf) {
  var arr = Array.from(new Uint8Array(buf));
  return arr.map(function(b) { return ('00' + b.toString(16)).slice(-2); }).join('');
 });
}

// Intercept console.log — bắt object `creep` từ CreepJS
var _origLog = console.log;
var _origGroupCollapsed = console.groupCollapsed;
var _origGroupEnd = console.groupEnd;
var _capturedCreep = null;
var _stableFingerprint = false;

console.log = function() {
 _origLog.apply(console, arguments);
 for (var i = 0; i < arguments.length; i++) {
  var arg = arguments[i];
  // Bắt dấu hiệu "stable fingerprint passed"
  if (typeof arg === 'string' && arg.indexOf('stable fingerprint') !== -1) {
   _stableFingerprint = true;
  }
  // Bắt object creep — có canvas2d, headless, workerScope
  if (_stableFingerprint && !_capturedCreep && arg && typeof arg === 'object' && !Array.isArray(arg)) {
   if (arg.canvas2d !== undefined || arg.canvasWebgl !== undefined || arg.headless !== undefined) {
    _capturedCreep = arg;
    // Hash ngay và gửi
    try {
     sha256(JSON.stringify(arg)).then(function(hash) {
      if (hash && !_sent) {
       sendResult({
        visitorId: hash,
        botDetection: extractBot()
       });
      }
     });
    } catch(e) {}
   }
  }
 }
};

console.groupCollapsed = function() { _origGroupCollapsed.apply(console, arguments); };
console.groupEnd = function() { _origGroupEnd.apply(console, arguments); };

function extractBot() {
 var bot = false;
 try {
  if (_capturedCreep && _capturedCreep.headless) {
   if (_capturedCreep.headless.headless || _capturedCreep.headless.stealth) bot = true;
  }
  if (_capturedCreep && _capturedCreep.workerScope && _capturedCreep.workerScope.lied) bot = true;
 } catch(e) {}
 return { bot: bot, creepDetected: true };
}

// Load creep.js
var s = document.createElement('script');
s.src = '/creep.js';
s.onerror = function() {
 // Không gửi unknown — retry
 setTimeout(function() {
  var s2 = document.createElement('script');
  s2.src = '/creep.js?r=' + Date.now();
  document.head.appendChild(s2);
 }, 2000);
};
document.head.appendChild(s);

// Poll window.Creep nếu console.log không bắt được
var _pollCount = 0;
var _pollTimer = setInterval(function() {
 _pollCount++;
 if (_sent) { clearInterval(_pollTimer); return; }

 // Check window.Creep
 if (window.Creep && !_sent) {
  try {
   sha256(JSON.stringify(window.Creep)).then(function(hash) {
    if (hash && !_sent) {
     sendResult({ visitorId: hash, botDetection: extractBot() });
    }
   });
  } catch(e) {}
 }

 // Không timeout — chờ đến khi có hash thật
 if (_pollCount >= 120) { // 60 giây max
  clearInterval(_pollTimer);
 }
}, 500);
</script>
</body>
</html>
