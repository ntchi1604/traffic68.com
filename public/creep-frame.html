<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>fp</title></head>
<body>
<script>
// This page runs inside a hidden iframe on traffic68.com
// CreepJS will work here because ServiceWorker is same-origin

var _origLog = console.log;
var _sent = false;

function sendResult(data) {
  if (_sent) return;
  _sent = true;
  // Send to parent window (embed script on external domain)
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'creep-result', data: data }, '*');
  }
}

// Hook console.log to capture CreepJS output
console.log = function () {
  for (var i = 0; i < arguments.length; i++) {
    var arg = arguments[i];
    if (arg && typeof arg === 'object' && arg.workerScope && arg.workerScope.lied !== undefined) {
      var totalLied = 0;
      var liedSections = [];
      for (var key in arg) {
        if (arg[key] && typeof arg[key] === 'object' && arg[key].lied !== undefined) {
          var liedVal = arg[key].lied === true ? 1 : (typeof arg[key].lied === 'number' ? arg[key].lied : 0);
          totalLied += liedVal;
          if (liedVal > 0) liedSections.push(key + ':' + liedVal);
        }
      }
      var visitorId = (arg.workerScope && arg.workerScope.$hash) ? arg.workerScope.$hash : 'unknown';
      sendResult({
        visitorId: visitorId,
        botDetection: {
          bot: totalLied > 0,
          totalLied: totalLied,
          liedSections: liedSections,
          headless: arg.headless || (arg.headlessness ? arg.headlessness.lied : null),
          stealth: arg.stealth || (arg.resistance ? arg.resistance.lied : null)
        }
      });
      console.log = _origLog;
      return;
    }
  }
};

// Load CreepJS
var s = document.createElement('script');
s.src = '/creep.js';
s.onerror = function () {
  sendResult({ visitorId: 'unknown', botDetection: { bot: false, creepError: true } });
  console.log = _origLog;
};
document.head.appendChild(s);

// Timeout: 10s
setTimeout(function () {
  if (!_sent) {
    sendResult({ visitorId: 'unknown', botDetection: { bot: false, creepTimeout: true } });
    console.log = _origLog;
  }
}, 10000);
</script>
</body>
</html>
