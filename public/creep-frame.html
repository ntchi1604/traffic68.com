<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>fp</title></head>
<body>
<script>
var _sent = false;

function sendResult(data) {
 if (_sent) return;
 _sent = true;
 if (window.parent && window.parent !== window) {
 window.parent.postMessage({ type: 'creep-result', data: data }, '*');
 }
}

// Load CreepJS
var s = document.createElement('script');
s.src = '/creep.js';
s.onload = function() {
 // Wait for CreepJS to initialize and check for global visitorId
 setTimeout(function() {
 // Check if CreepJS exposes visitorId globally
 if (window.CreepJS && window.CreepJS.visitorId) {
 sendResult({ visitorId: window.CreepJS.visitorId, botDetection: { bot: false } });
 return;
 }
 if (window.creep && window.creep.visitorId) {
 sendResult({ visitorId: window.creep.visitorId, botDetection: { bot: false } });
 return;
 }
 if (window.$creep && window.$creep.visitorId) {
 sendResult({ visitorId: window.$creep.visitorId, botDetection: { bot: false } });
 return;
 }
 // If no global exposed, try to read from creep object if exists
 if (window.creepjs && typeof window.creepjs === 'object') {
 var data = window.creepjs;
 var visitorId = data.visitorId || data.id || data.hash || data.$hash || 'unknown';
 sendResult({ visitorId: visitorId, botDetection: { bot: false, creepDebug: data } });
 return;
 }
 // Still no luck - send debug info
 sendResult({ visitorId: 'unknown', botDetection: { bot: false, creepNoGlobal: true } });
 }, 3000);
};
s.onerror = function () {
 sendResult({ visitorId: 'unknown', botDetection: { bot: false, creepError: true } });
};
document.head.appendChild(s);

// Timeout 10s
setTimeout(function () {
 if (!_sent) {
 sendResult({ visitorId: 'unknown', botDetection: { bot: false, creepTimeout: true } });
 }
}, 10000);
</script>
</body>
</html>
