<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>fp</title></head>
<body>
<script>
var _sent = false;

function sendResult(data) {
 if (_sent) return;
 _sent = true;
 if (window.parent && window.parent !== window) {
  window.parent.postMessage({ type: 'creep-result', data: data }, '*');
 }
}

// Intercept console.log to capture botDetection data
var _origLog = console.log;
var _origGroupCollapsed = console.groupCollapsed;
var _origGroupEnd = console.groupEnd;
var _botData = null;
var _capturedCreep = null;

console.log = function () {
 for (var i = 0; i < arguments.length; i++) {
  var arg = arguments[i];
  if (arg && typeof arg === 'object') {
   // CreepJS logs the stable 'creep' object via console.log(creep) at line ~9547
   // It has fields like: canvas2d, canvasWebgl, workerScope, headless, etc.
   if (arg.workerScope && arg.canvas2d !== undefined && arg.headless !== undefined) {
    _capturedCreep = arg;
   }
   // Check for lies/bot indicators from workerScope
   if (arg.lied !== undefined && arg.lies !== undefined) {
    _botData = {
     bot: !!arg.lied,
     totalLied: 0,
     lied: arg.lies || {}
    };
   }
  }
 }
 _origLog.apply(console, arguments);
};

// Suppress grouped output to speed things up  
console.groupCollapsed = function() { _origGroupCollapsed.apply(console, arguments); };
console.groupEnd = function() { _origGroupEnd.apply(console, arguments); };

// SHA-256 hash function (same as CreepJS uses)
async function sha256(text) {
 var data = new TextEncoder().encode(text);
 var hashBuffer = await crypto.subtle.digest('SHA-256', data);
 var hashArray = Array.from(new Uint8Array(hashBuffer));
 return hashArray.map(function(b) { return ('00' + b.toString(16)).slice(-2); }).join('');
}

// Main polling function
function pollForFingerprint() {
 var attempts = 0;
 var maxAttempts = 70; // 35 seconds (500ms * 70)
 
 var interval = setInterval(function() {
  attempts++;
  
  // Strategy 1: Read hash from DOM element #creep-fingerprint
  // CreepJS renders: <div id="creep-fingerprint">FP ID: <span>...hash chars...</span></div>
  var fpEl = document.getElementById('creep-fingerprint');
  if (fpEl) {
   var text = fpEl.textContent || '';
   // Extract hex hash (64 chars for SHA-256)
   var hashMatch = text.match(/[a-f0-9]{64}/i);
   if (hashMatch) {
    clearInterval(interval);
    var hash = hashMatch[0];
    
    // Also try to get bot detection data from window.Fingerprint
    var botDetection = extractBotDetection();
    
    sendResult({
     visitorId: hash,
     botDetection: botDetection
    });
    restoreConsole();
    return;
   }
  }
  
  // Strategy 2: Hash the captured creep object ourselves
  if (_capturedCreep && !_sent) {
   try {
    var jsonStr = JSON.stringify(_capturedCreep);
    sha256(jsonStr).then(function(hash) {
     if (!_sent && hash) {
      clearInterval(interval);
      sendResult({
       visitorId: hash,
       botDetection: extractBotDetection()
      });
      restoreConsole();
     }
    });
   } catch(e) {}
  }
  
  // Strategy 3: If window.Fingerprint exists, try to hash its creep version
  if (window.Fingerprint && window.Creep && !_sent && attempts > 6) {
   try {
    var creepJson = JSON.stringify(window.Creep);
    sha256(creepJson).then(function(hash) {
     if (!_sent && hash) {
      clearInterval(interval);
      sendResult({
       visitorId: hash,
       botDetection: extractBotDetection()
      });
      restoreConsole();
     }
    });
   } catch(e) {}
  }
  
  // Timeout — send whatever we have
  if (attempts >= maxAttempts) {
   clearInterval(interval);
   sendResult({
    visitorId: 'unknown',
    botDetection: _botData || { bot: false, creepTimeout: true }
   });
   restoreConsole();
  }
 }, 500);
}

function extractBotDetection() {
 var bot = false;
 var totalLied = 0;
 var lied = {};
 
 try {
  var fp = window.Fingerprint;
  if (fp) {
   if (fp.workerScope) {
    if (fp.workerScope.lied) bot = true;
    if (fp.workerScope.lies && fp.workerScope.lies.proto) {
     lied = fp.workerScope.lies.proto;
     var keys = Object.keys(lied);
     for (var i = 0; i < keys.length; i++) {
      totalLied += (lied[keys[i]].length || 0);
     }
    }
   }
   if (fp.headless) {
    if (fp.headless.headless) bot = true;
    if (fp.headless.stealth) bot = true;
   }
  }
 } catch(e) {}
 
 return _botData || { bot: bot, totalLied: totalLied, lied: lied };
}

function restoreConsole() {
 console.log = _origLog;
 console.groupCollapsed = _origGroupCollapsed;
 console.groupEnd = _origGroupEnd;
}

// Load creep.js
var s = document.createElement('script');
s.src = '/creep.js';
s.onload = function () {
 pollForFingerprint();
};
s.onerror = function () {
 sendResult({ visitorId: 'unknown', botDetection: { bot: false, creepError: true } });
 restoreConsole();
};
document.head.appendChild(s);

// Hard timeout 40s
setTimeout(function () {
 if (!_sent) {
  // Last-ditch effort: check DOM one more time
  var fpEl = document.getElementById('creep-fingerprint');
  if (fpEl) {
   var text = fpEl.textContent || '';
   var hashMatch = text.match(/[a-f0-9]{64}/i);
   if (hashMatch) {
    sendResult({ visitorId: hashMatch[0], botDetection: extractBotDetection() });
    restoreConsole();
    return;
   }
  }
  sendResult({
   visitorId: 'unknown',
   botDetection: _botData || { bot: false, creepTimeout: true }
  });
  restoreConsole();
 }
}, 40000);
</script>
</body>
</html>
