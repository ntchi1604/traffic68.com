<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="robots" content="noindex, nofollow, noarchive"><title>fp</title></head>
<body>
<script>
// Block ServiceWorker trong iframe
try {
 if (navigator.serviceWorker) {
  Object.defineProperty(navigator, 'serviceWorker', { get: function() { return undefined; } });
 }
} catch(e) {}

var _sent = false;
var _origError = console.error;

// Ẩn lỗi worker
console.error = function() {
 for (var i = 0; i < arguments.length; i++) {
  var msg = String(arguments[i] || '');
  if (msg.indexOf('orker') !== -1 || msg.indexOf('fetch') !== -1) return;
 }
 _origError.apply(console, arguments);
};

function sendResult(data) {
 if (_sent) return;
 // Bắt buộc phải có visitorId thật — không gửi 'unknown'
 if (!data.visitorId || data.visitorId === 'unknown') return;
 _sent = true;
 if (window.parent && window.parent !== window) {
  window.parent.postMessage({ type: 'creep-result', data: data }, '*');
 }
}

// SHA-256 hash — giống cách CreepJS tính
function sha256(text) {
 var data = new TextEncoder().encode(text);
 return crypto.subtle.digest('SHA-256', data).then(function(buf) {
  var arr = Array.from(new Uint8Array(buf));
  return arr.map(function(b) { return ('00' + b.toString(16)).slice(-2); }).join('');
 });
}

// Intercept console.log — bắt object `creep` từ CreepJS
var _origLog = console.log;
var _origGroupCollapsed = console.groupCollapsed;
var _origGroupEnd = console.groupEnd;
var _capturedCreep = null;
var _stableFingerprint = false;

console.log = function() {
 _origLog.apply(console, arguments);
 for (var i = 0; i < arguments.length; i++) {
  var arg = arguments[i];
  // Bắt dấu hiệu "stable fingerprint passed"
  if (typeof arg === 'string' && arg.indexOf('stable fingerprint') !== -1) {
   _stableFingerprint = true;
  }
  // Bắt object creep — có canvas2d, headless, workerScope
  if (_stableFingerprint && !_capturedCreep && arg && typeof arg === 'object' && !Array.isArray(arg)) {
   if (arg.canvas2d !== undefined || arg.canvasWebgl !== undefined || arg.headless !== undefined) {
    _capturedCreep = arg;
    // Hash ngay và gửi
    try {
     sha256(JSON.stringify(arg)).then(function(hash) {
      if (hash && !_sent) {
       sendResult({
        visitorId: hash,
        botDetection: extractBotFull()
       });
      }
     });
    } catch(e) {}
   }
  }
 }
};

console.groupCollapsed = function() { _origGroupCollapsed.apply(console, arguments); };
console.groupEnd = function() { _origGroupEnd.apply(console, arguments); };

/**
 * extractBotFull — extract toàn bộ fingerprint signals từ CreepJS
 * Dùng cho tất cả detection logic ở backend.
 * Những gì CreepJS có: canvas, audio, fonts, screen, hardware, webdriver/headless, lies
 * Những gì cần thu thập riêng: click latency, scroll speed, sensor (DeviceMotion)
 */
function extractBotFull() {
 var result = { bot: false, creepDetected: true };
 if (!_capturedCreep) return result;

 try {
  // ── 1. Bot / Headless detection ──
  var headless = _capturedCreep.headless || {};
  if (headless.headless || headless.stealth) result.bot = true;
  result.headless = !!headless.headless;
  result.stealth = !!headless.stealth;

  // Webdriver flags
  if (_capturedCreep.workerScope && _capturedCreep.workerScope.lied) {
   result.bot = true;
   result.workerLied = true;
  }

  // ── 2. Lies detected by CreepJS ──
  var lies = _capturedCreep.lies || {};
  result.liesCount = Object.keys(lies).length;
  result.lieNames = Object.keys(lies).slice(0, 10); // top 10 lie names

  // ── 3. Canvas fingerprint (hash + noise detection) ──
  // CreepJS canvas2d có hash và lied flag
  var canvas2d = _capturedCreep.canvas2d || {};
  if (canvas2d.dataURI) {
   // Lấy hash từ canvas dataURI (dùng đoạn đầu để phân biệt hardware)
   var c1 = canvas2d.dataURI;
   result.canvasHash = c1 ? c1.substring(0, 64) : null;
  }
  if (canvas2d.lied) {
   result.canvasLied = true; // CreepJS phát hiện canvas bị lie = Anti-detect browser
   result.bot = true;
  }
  // Canvas noise: vẽ 2 lần và so sánh (tự thu thập vì CreepJS chỉ vẽ 1 lần)
  result.canvas = extractCanvasNoise();

  // ── 4. Audio fingerprint (hash) ──
  var audio = _capturedCreep.offlineAudioContext || _capturedCreep.audioContext || {};
  if (audio.values) {
   try { result.audioHash = audio.values.slice(0, 8).join(','); } catch(e) {}
  }
  if (audio.lied) {
   result.audioLied = true; // Anti-detect browser injecting audio noise
  }

  // ── 5. WebGL fingerprint ──
  var webgl = _capturedCreep.canvasWebgl || {};
  if (webgl.renderer) result.webglRenderer = webgl.renderer;
  if (webgl.vendor) result.webglVendor = webgl.vendor;
  if (webgl.lied) result.webglLied = true;

  // ── 6. Fonts (dùng CreepJS data) ──
  var fonts = _capturedCreep.fonts || {};
  if (Array.isArray(fonts.fonts)) {
   result.fonts = fonts.fonts.slice(0, 20); // Lấy tối đa 20 fonts
  }
  if (fonts.lied) result.fontsLied = true;

  // ── 7. Screen & Window ──
  var scr = _capturedCreep.screen || {};
  result.screen = {
   width: screen.width,
   height: screen.height,
   innerWidth: window.innerWidth,
   innerHeight: window.innerHeight,
   colorDepth: screen.colorDepth,
   pixelRatio: window.devicePixelRatio || 1,
   // CreepJS detected screen lies
   lied: !!scr.lied,
  };

  // ── 8. Hardware (từ CreepJS workerScope hoặc navigator) ──
  var workerScope = _capturedCreep.workerScope || {};
  result.hardware = {
   cores: navigator.hardwareConcurrency || workerScope.hardwareConcurrency || null,
   ram: navigator.deviceMemory || null, // in GB
   platform: navigator.platform || '',
   maxTouchPoints: navigator.maxTouchPoints || 0,
  };

  // ── 9. Navigator flags (CreepJS detects lies on these) ──
  var nav = _capturedCreep.navigatorVersion || _capturedCreep.navigator || {};
  result.navigatorLied = !!nav.lied;
  result.userAgentLied = !!(_capturedCreep.headless && _capturedCreep.headless.ua);

  // ── 10. Timezone ──
  var tz = _capturedCreep.timezone || {};
  result.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
  result.timezoneLied = !!tz.lied;

  // ── 11. Plugins ──
  var plugins = _capturedCreep.navigatorPlugins || {};
  result.pluginsLied = !!plugins.lied;

  // ── 12. Overall lie score ──
  result.totalLies = (result.liesCount || 0) +
   (result.canvasLied ? 5 : 0) +
   (result.audioLied ? 5 : 0) +
   (result.webglLied ? 3 : 0) +
   (result.fontsLied ? 3 : 0) +
   (result.navigatorLied ? 5 : 0);

  if (result.totalLies >= 5) result.bot = true; // nhiều lies = anti-detect

 } catch(e) {}

 return result;
}

/**
 * Canvas Noise Detection — vẽ 2 lần, so sánh pixel data
 * CreepJS không làm điều này (chỉ vẽ 1 lần), nên chúng ta tự làm.
 * Nếu hash1 !== hash2 → Anti-detect đang inject nhiễu → fake
 */
function extractCanvasNoise() {
 try {
  var drawCanvas = function(seed) {
   var c = document.createElement('canvas');
   c.width = 200; c.height = 50;
   var ctx = c.getContext('2d');
   if (!ctx) return null;
   ctx.textBaseline = 'alphabetic';
   ctx.fillStyle = '#f60'; ctx.fillRect(125, 1, 62, 20);
   ctx.fillStyle = '#069'; ctx.font = '15px Arial';
   ctx.fillText('anti-detect-test ' + seed, 2, 15);
   ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
   ctx.font = '12px Arial';
   ctx.fillText('canvas-noise-check', 4, 35);
   // Tạo pattern với tọa độ cố định — nếu bị thêm noise thì sẽ khác
   ctx.beginPath();
   ctx.arc(50, 25, 15, 0, Math.PI * 2);
   ctx.fillStyle = 'rgba(50, 100, 200, 0.5)';
   ctx.fill();
   return c.toDataURL().substring(22, 86); // lấy 64 chars từ base64
  };
  var h1 = drawCanvas('fixed-seed-1');
  var h2 = drawCanvas('fixed-seed-1'); // cùng seed, vẽ lại
  if (!h1 || !h2) return null;
  return {
   hash1: h1,
   hash2: h2,
   noisy: h1 !== h2,
  };
 } catch(e) {
  return null;
 }
}

// Load creep.js
var s = document.createElement('script');
s.src = '/creep.js';
s.onerror = function() {
 // Không gửi unknown — retry
 setTimeout(function() {
  var s2 = document.createElement('script');
  s2.src = '/creep.js?r=' + Date.now();
  document.head.appendChild(s2);
 }, 2000);
};
document.head.appendChild(s);

// Poll window.Creep nếu console.log không bắt được
var _pollCount = 0;
var _pollTimer = setInterval(function() {
 _pollCount++;
 if (_sent) { clearInterval(_pollTimer); return; }

 // Check window.Creep
 if (window.Creep && !_sent) {
  _capturedCreep = window.Creep;
  try {
   sha256(JSON.stringify(window.Creep)).then(function(hash) {
    if (hash && !_sent) {
     sendResult({ visitorId: hash, botDetection: extractBotFull() });
    }
   });
  } catch(e) {}
 }

 // Không timeout — chờ đến khi có hash thật
 if (_pollCount >= 120) { // 60 giây max
  clearInterval(_pollTimer);
 }
}, 500);
</script>
</body>
</html>
